server:
  port: 8080

spring:
  application:
    name: sdd-gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:public}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      # 全局默认过滤器
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      # 跨域配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "*"
            allowed-methods: "*"
            allowed-headers: "*"
            allow-credentials: false
      routes:
        # 用户服务路由：/api/users → /users，/api/users/xxx → /users/xxx
        - id: sdd-user-service
          uri: lb://sdd-user-service
          predicates:
            - Path=/api/users,/api/users/**
          filters:
            - RewritePath=/api(?<segment>/.*), ${segment}

        # 认证服务路由（白名单，不走 JWT 过滤）：/api/auth → /auth，/api/auth/xxx → /auth/xxx
        - id: sdd-auth
          uri: lb://sdd-auth
          predicates:
            - Path=/api/auth,/api/auth/**
          filters:
            - RewritePath=/api(?<segment>/.*), ${segment}

# SDD 自定义配置
sdd:
  security:
    jwt:
      secret: ${JWT_SECRET:sdd-microservice-jwt-secret-key-minimum-32-chars}
    white-list:
      - /api/auth/**
      - /actuator/**
      - /v3/api-docs/**
      - /swagger-ui/**

# 日志
logging:
  level:
    com.sdd.gateway: DEBUG
    org.springframework.cloud.gateway: INFO

# 监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always

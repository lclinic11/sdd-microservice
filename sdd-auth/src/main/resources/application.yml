server:
  port: 8081

spring:
  application:
    name: sdd-auth
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0

sdd:
  security:
    jwt:
      secret: ${JWT_SECRET:sdd-microservice-jwt-secret-key-minimum-32-chars}
      access-token-expire-ms: 7200000    # 2 小时
      refresh-token-expire-ms: 604800000  # 7 天

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.sdd.auth: DEBUG

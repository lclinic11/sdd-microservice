# Redis 配置文件 - SDD Microservice 本地开发环境

# 网络
bind 0.0.0.0
port 6379
protected-mode yes

# 密码（需与 .env 中 REDIS_PASSWORD 一致）
requirepass sdd123

# 持久化 - AOF（保证数据不丢失）
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no

# 持久化 - RDB（定期快照）
save 900 1
save 300 10
save 60 10000

# 内存策略（开发环境 256MB 上限，超出按 LRU 淘汰）
maxmemory 256mb
maxmemory-policy allkeys-lru

# 日志
loglevel notice
logfile ""

# 超时（秒，0=不超时）
timeout 300
tcp-keepalive 300
